<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin: 0; padding: 0; background-color: #F5F3EF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #F5F3EF; padding: 40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08);">
          <!-- Header -->
          <tr>
            <td style="background: linear-gradient(135deg, #1B4D3E 0%, #2A6B56 100%); padding: 32px 40px; text-align: center;">
              <table cellpadding="0" cellspacing="0" style="margin: 0 auto;">
                <tr>
                  <td style="width: 44px; height: 44px; background: linear-gradient(135deg, #D4A053, #E8B96A); border-radius: 12px; text-align: center; vertical-align: middle;">
                    <span style="color: #ffffff; font-size: 22px; font-weight: bold; line-height: 44px;">P</span>
                  </td>
                  <td style="padding-left: 14px;">
                    <span style="color: #ffffff; font-size: 26px; font-weight: 700; letter-spacing: -0.5px;">Partners</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding: 40px;">
              <h1 style="margin: 0 0 8px; font-size: 22px; font-weight: 700; color: #2D2A26;">
                Seu link de acesso
              </h1>
              <p style="margin: 0 0 24px; font-size: 15px; color: #7A7468; line-height: 1.5;">
                Clique no botao abaixo para acessar a plataforma de onboarding da Partners. Este link e de uso unico.
              </p>
              <!-- Button -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding: 8px 0 32px;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; background-color: #1B4D3E; color: #ffffff; font-size: 15px; font-weight: 600; text-decoration: none; padding: 14px 40px; border-radius: 12px;">
                      Entrar na plataforma
                    </a>
                  </td>
                </tr>
              </table>
              <!-- Divider -->
              <hr style="border: none; border-top: 1px solid #E0DCD6; margin: 0 0 24px;" />
              <p style="margin: 0; font-size: 13px; color: #B0A99E; line-height: 1.5;">
                Se voce nao solicitou este link, ignore este email. O link expira em 24 horas.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color: #F9F8F6; padding: 20px 40px; text-align: center; border-top: 1px solid #E0DCD6;">
              <p style="margin: 0; font-size: 12px; color: #B0A99E;">
                Partners Comunicacao Integrada
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
